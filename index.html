<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Keys</title>
<style>
:root { --accent: #ffffff; --bg: #0a0a0a; }
body {
    margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                    radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                    radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
    height: 100vh; display: flex; justify-content: center; align-items: center; color: white;
}
.glass-card {
    background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px; padding: 40px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.4; margin-bottom: 8px; }
#date-now { font-size: 14px; font-weight: 500; margin-bottom: 30px; opacity: 0.8; }
#key-display { 
    font-family: "SF Mono", monospace; 
    font-size: 28px; 
    font-weight: 700; 
    letter-spacing: 2px; 
    cursor: pointer;
}
.copy-hint { font-size: 11px; margin-top: 10px; opacity: 0.3; }
#countdown { font-size: 18px; font-weight: 300; color: #888; }
#toast { visibility: hidden; background: white; color: black; padding: 12px 24px; border-radius: 50px; position: fixed; bottom: 30px; font-weight: 600; }
#toast.show { visibility: visible; animation: fadeInUp 0.3s; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
#login-btn { padding: 12px 24px; border-radius: 12px; background: #5865F2; color: white; border: none; cursor: pointer; font-weight: 600; margin-top: 20px; }
</style>
</head>
<body>
<div class="glass-card">
    <div class="label">Today</div>
    <div id="date-now">---</div>

    <div class="key-container" onclick="copyKey()">
        <div class="label" style="color: #00d4ff;">Current Key</div>
        <span id="key-display">LOGIN REQUIRED</span>
        <div class="copy-hint">Tap key to copy</div>
    </div>

    <div class="timer-box">
        <div class="label">Reset In</div>
        <div id="countdown">00:00:00</div>
    </div>

    <button id="login-btn" onclick="loginWithDiscord()">Login with Discord</button>
</div>

<div id="toast">Copied to clipboard</div>

<script>
// CONFIG
const CLIENT_ID = "1491564164160819250";
const REDIRECT_URI = "https://testprojectkonger.vercel.app";

let currentKey = "";
let accessToken = null;

// Check if we have token from callback redirect
const urlParams = new URLSearchParams(window.location.search);
accessToken = urlParams.get('access_token');

if (accessToken) {
    // Clean the URL (remove token from address bar)
    window.history.replaceState({}, document.title, window.location.pathname);
}

function getLocalDate() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

function loginWithDiscord() {
    const loginUrl = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI + '/api/auth/callback')}&response_type=code&scope=identify%20guilds`;
    window.location.href = loginUrl;
}

async function loadTodayKey() {
    if (!accessToken) {
        document.getElementById('key-display').innerText = "LOGIN REQUIRED";
        return;
    }

    document.getElementById("login-btn").style.display = "none";

    try {
        const localDate = getLocalDate();

        const res = await fetch('/api/get-key', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                discordToken: accessToken,
                localDate: localDate 
            })
        });

        const data = await res.json();

        if (data.success && data.key) {
            currentKey = data.key;
            document.getElementById('key-display').innerText = currentKey;
        } else {
            document.getElementById('key-display').innerText = data.message || "NO KEY FOR TODAY";
        }
    } catch (err) {
        console.error(err);
        document.getElementById('key-display').innerText = "SERVER ERROR";
    }
}

function copyKey() {
    if (!currentKey || currentKey === "LOGIN REQUIRED" || currentKey === "NO KEY FOR TODAY") {
        return alert("No key available to copy");
    }
    navigator.clipboard.writeText(currentKey);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function tick() {
    const now = new Date();
    document.getElementById('date-now').innerText = now.toLocaleDateString('en-US', { 
        month: 'short', day: 'numeric', year: 'numeric' 
    });

    const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    const diff = tomorrow - now;

    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById('countdown').innerText = 
        `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

setInterval(tick, 1000);
tick();

// Initialize the page
if (accessToken) {
    loadTodayKey();
} else {
    document.getElementById('key-display').innerText = "LOGIN REQUIRED";
}
</script>
</body>
</html>
